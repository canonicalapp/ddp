name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # No git hooks during install; semantic-release must not pick up local hook side effects
      HUSKY: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # semantic-release v25+ requires ^22.14.0 or >=24.10.0
          node-version: 22
          cache: npm

      - name: Install dependencies
        # Skip lifecycle scripts (e.g. prepare/husky). Publish still runs prepublishOnly for build.
        run: npm ci --ignore-scripts

      # Intentionally no lint/format/tests here — release must not run npm lifecycle
      # hooks that invoke check:all (see RELEASING.md). Quality gates: local hooks + optional npm run check:all.

      - name: Verify git tag baseline vs npm (semantic-release)
        run: node scripts/verify-release-baseline.cjs

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release

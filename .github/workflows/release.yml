name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # No git hooks during install; semantic-release must not pick up local hook side effects
      HUSKY: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # semantic-release v25+ requires ^22.14.0 or >=24.10.0
          node-version: 22
          cache: npm

      - name: Install dependencies
        # Skip lifecycle scripts (e.g. prepare/husky). Publish still runs prepublishOnly for build.
        run: npm ci --ignore-scripts

      # Intentionally no lint/format/tests here — release must not run npm lifecycle
      # hooks that invoke check:all (see RELEASING.md). Quality gates: local hooks + optional npm run check:all.

      - name: Require git tag matching npm (semantic-release baseline)
        run: |
          set -euo pipefail
          REGISTRY_VERSION="$(npm view @advcomm/ddp version 2>/dev/null || true)"
          if [ -z "${REGISTRY_VERSION}" ]; then
            echo "Package not found on npm (or npm view failed); semantic-release may use first release 1.0.0."
            exit 0
          fi
          if git rev-parse "v${REGISTRY_VERSION}" >/dev/null 2>&1; then
            echo "OK: tag v${REGISTRY_VERSION} exists (npm latest ${REGISTRY_VERSION})."
            exit 0
          fi
          echo "::error::semantic-release will assume release 1.0.0 when no prior tag exists on this branch."
          echo "::error::npm already has ${REGISTRY_VERSION}. Create the missing tag on the commit that matches that publish:"
          echo "::error::  git tag v${REGISTRY_VERSION} <commit-sha> && git push origin v${REGISTRY_VERSION}"
          exit 1

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
